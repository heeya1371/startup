<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 근처 맛집 찾기</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=56382561c6babd2d2e56a8a7fb588c52"></script>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=56382561c6babd2d2e56a8a7fb588c52&autoload=false"></script>
    </head>
<body>
    <div class="main-container">
        <div class="header-nav">
            <header>
                <h1>캠퍼스 맛집 가이드</h1>
            </header>
        </div>

        <div class="content-body">
            <div class="map-container">
                <div id="map" style="width:100%; height:100%; min-height:400px;"></div>
            </div>
            
            <div class="side-panel">
                <div class="rank-list">
                    <h3>📍 추천 맛집 목록</h3>
                    <div id="restaurant-data"></div>
                </div>
                
                <div class="review-box">
                    <h3>✍️ 익명 후기 작성</h3>
                    <form id="review-form">
                        <input type="text" id="review-author" placeholder="닉네임 (익명)" required>
                        <textarea id="review-text" placeholder="솔직한 맛 평가를 남겨주세요!" required></textarea>
                        <button type="submit">후기 등록</button>
                    </form>
                    
                    <ul id="review-timeline"></ul>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <footer>
                <p>© 2026 커리어 패스파인더. All rights reserved.</p>
            </footer>
        </div>
    </div>

    <script src="main.js"></script>
    
</body>
</html>
